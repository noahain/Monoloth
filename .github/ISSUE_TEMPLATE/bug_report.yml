name: Bug report
description: Report something that isn't working
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug. The fields below save a round-trip.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we trigger it?
      placeholder: |
        1. Open a project at ...
        2. Run ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Monoloth version
      description: See the title bar or Settings. e.g. 2.1.4
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      description: e.g. Windows 11 23H2, macOS 14.5, Ubuntu 24.04
    validations:
      required: true
  - type: input
    id: agent
    attributes:
      label: CLI agent
      description: Which tool were you running? e.g. opencode, Claude Code
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant terminal output or log entries. This will be formatted as code.
      render: shell
    validations:
      required: false
