name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'

      - name: Install dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            build-essential \
            curl \
            wget \
            file

      - name: Install dependencies (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          choco install nsis -y
        shell: pwsh

      - name: Build, sign, and release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS signing is deferred. Do NOT set APPLE_* env vars here: an
          # empty-but-present APPLE_CERTIFICATE (from a missing secret) makes the
          # Tauri bundler attempt `security import` with an empty cert and fail.
          # Re-add these only once the APPLE_* secrets actually exist.
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Monoloth ${{ github.ref_name }}'
          releaseBody: |
            ### Which file do I download?

            - **Windows**: `x64-setup.exe` to install, or `x64_portable.exe` to run without installing.
            - **macOS**: `aarch64.dmg` for Apple Silicon (M1 and newer), `x64.dmg` for Intel.
            - **Linux**: `.AppImage` runs on any distro; grab the `.deb` or `.rpm` for your package manager.

            Ignore the `.sig` and `.app.tar.gz` files. The auto-updater uses those.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      # Manual dry-run: build every target without publishing a release, then
      # upload the bundles as workflow artifacts for inspection.
      - name: Build only (dry-run)
        if: github.event_name == 'workflow_dispatch'
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ${{ matrix.args }}

      # --- Portable artifacts ---
      # Windows: the compiled binary already embeds the whole frontend, so the
      # raw exe is a self-contained portable build (WebView2 is provided by the
      # OS). Linux is already covered by the .AppImage. macOS: a zipped .app is
      # the drag-to-run portable form alongside the .dmg installer.
      - name: Prepare Windows portable
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path portable | Out-Null
          $ver = (Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json).version
          Copy-Item "src-tauri/target/release/monoloth.exe" "portable/Monoloth_${ver}_x64_portable.exe"

      - name: Prepare macOS portable
        if: matrix.platform == 'macos-latest'
        run: |
          mkdir -p portable
          VER=$(grep '"version"' src-tauri/tauri.conf.json | head -1 | sed 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/')
          ARCH=x64
          echo "${{ matrix.args }}" | grep -q aarch64 && ARCH=aarch64
          APP=$(find src-tauri/target -path "*/release/bundle/macos/Monoloth.app" | head -n1)
          if [ -z "$APP" ]; then echo "Monoloth.app not found"; exit 1; fi
          ditto -c -k --keepParent "$APP" "portable/Monoloth_${VER}_${ARCH}_portable.app.zip"

      - name: Upload portable artifacts to release
        if: startsWith(github.ref, 'refs/tags/v') && matrix.platform != 'ubuntu-22.04'
        shell: bash
        run: gh release upload "${{ github.ref_name }}" portable/* --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload dry-run artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: monoloth-${{ matrix.platform }}-${{ strategy.job-index }}
          path: |
            src-tauri/target/release/bundle/**
            src-tauri/target/*/release/bundle/**
            portable/**
          if-no-files-found: warn

  # Each matrix job above generates a latest.json containing ONLY the platform
  # it built, and they race to upload it -> the published manifest ends up
  # single-platform (historically Windows-only), breaking auto-updates for
  # macOS and Linux. This job runs after the whole matrix, reads every
  # uploaded updater .sig (whose verbatim text IS the signature value), and
  # writes one combined latest.json that covers all platforms.
  finalize-updater:
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    steps:
      - name: Assemble cross-platform latest.json
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"
          WORK="$(mktemp -d)"
          assets=$(gh release view "$TAG" --repo "$REPO" --json assets --jq '.assets[].name')

          # first non-.sig asset matching the regex
          find_asset() { echo "$assets" | grep -E "$1" | grep -v '\.sig$' | head -n1; }
          # download <name>.sig and print its verbatim contents (the signature)
          sig_of() {
            gh release download "$TAG" --repo "$REPO" -p "$1.sig" -O "$WORK/$1.sig" --clobber >/dev/null
            cat "$WORK/$1.sig"
          }

          WIN_MSI=$(find_asset '_x64_en-US\.msi$')
          WIN_NSIS=$(find_asset '_x64-setup\.exe$')
          MAC_ARM=$(find_asset 'aarch64\.app\.tar\.gz$')
          MAC_X64=$(find_asset '_x64\.app\.tar\.gz$')
          LINUX=$(find_asset 'amd64\.AppImage$')
          for v in WIN_MSI WIN_NSIS MAC_ARM MAC_X64 LINUX; do
            if [ -z "${!v}" ]; then echo "::error::missing updater asset for $v"; exit 1; fi
          done

          jq -n \
            --arg version "$VERSION" \
            --arg pubdate "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)" \
            --arg win_msi_url   "$BASE/$WIN_MSI"  --arg win_msi_sig  "$(sig_of "$WIN_MSI")" \
            --arg win_nsis_url  "$BASE/$WIN_NSIS" --arg win_nsis_sig "$(sig_of "$WIN_NSIS")" \
            --arg mac_arm_url   "$BASE/$MAC_ARM"  --arg mac_arm_sig  "$(sig_of "$MAC_ARM")" \
            --arg mac_x64_url   "$BASE/$MAC_X64"  --arg mac_x64_sig  "$(sig_of "$MAC_X64")" \
            --arg linux_url     "$BASE/$LINUX"    --arg linux_sig    "$(sig_of "$LINUX")" \
            '{
              version: $version,
              notes: "See the assets below to download and install.",
              pub_date: $pubdate,
              platforms: {
                "windows-x86_64":      { signature: $win_msi_sig,  url: $win_msi_url },
                "windows-x86_64-msi":  { signature: $win_msi_sig,  url: $win_msi_url },
                "windows-x86_64-nsis": { signature: $win_nsis_sig, url: $win_nsis_url },
                "darwin-aarch64":      { signature: $mac_arm_sig,  url: $mac_arm_url },
                "darwin-x86_64":       { signature: $mac_x64_sig,  url: $mac_x64_url },
                "linux-x86_64":        { signature: $linux_sig,    url: $linux_url }
              }
            }' > "$WORK/latest.json"

          echo "Assembled latest.json:"; jq '.platforms | keys' "$WORK/latest.json"
          gh release upload "$TAG" --repo "$REPO" "$WORK/latest.json" --clobber
