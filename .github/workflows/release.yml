name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'

      - name: Install dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            build-essential \
            curl \
            wget \
            file

      - name: Install dependencies (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          choco install nsis -y
        shell: pwsh

      - name: Build, sign, and release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Monoloth ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download and install.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      # Manual dry-run: build every target without publishing a release, then
      # upload the bundles as workflow artifacts for inspection.
      - name: Build only (dry-run)
        if: github.event_name == 'workflow_dispatch'
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ${{ matrix.args }}

      # --- Portable artifacts ---
      # Windows: the compiled binary already embeds the whole frontend, so the
      # raw exe is a self-contained portable build (WebView2 is provided by the
      # OS). Linux is already covered by the .AppImage. macOS: a zipped .app is
      # the drag-to-run portable form alongside the .dmg installer.
      - name: Prepare Windows portable
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path portable | Out-Null
          Copy-Item "src-tauri/target/release/monoloth.exe" "portable/Monoloth_x64_portable.exe"

      - name: Prepare macOS portable
        if: matrix.platform == 'macos-latest'
        run: |
          mkdir -p portable
          ARCH=x64
          echo "${{ matrix.args }}" | grep -q aarch64 && ARCH=aarch64
          APP=$(find src-tauri/target -path "*/release/bundle/macos/Monoloth.app" | head -n1)
          if [ -z "$APP" ]; then echo "Monoloth.app not found"; exit 1; fi
          ditto -c -k --keepParent "$APP" "portable/Monoloth_${ARCH}_portable.app.zip"

      - name: Upload portable artifacts to release
        if: startsWith(github.ref, 'refs/tags/v') && matrix.platform != 'ubuntu-22.04'
        shell: bash
        run: gh release upload "${{ github.ref_name }}" portable/* --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload dry-run artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: monoloth-${{ matrix.platform }}-${{ strategy.job-index }}
          path: |
            src-tauri/target/release/bundle/**
            src-tauri/target/*/release/bundle/**
            portable/**
          if-no-files-found: warn
