cases:
  # Positive cases — should trigger

  - id: validate_startup_idea
    prompt: "Validate this idea: a platform that connects freelance CFOs with early-stage startups that can't afford full-time finance leaders"
    fixtures: []
    rubric:
      - "constructs a Lean Canvas with all 9 boxes populated"
      - "performs JTBD analysis identifying functional, emotional, and social jobs"
      - "spawns parallel agents for market, competitive, and feasibility research"
      - "produces a validation scorecard with weighted scores across 6 dimensions"
      - "delivers a verdict with overall score"
    trigger_expected: true
    assertions:
      - type: contains
        target: "Lean Canvas"
        weight: 1.0
      - type: matches_regex
        target: "Strong|Promising|Risky|Weak"
        weight: 1.0
      - type: matches_regex
        target: "\\d\\.\\d\\s*/\\s*5"
        weight: 0.8
      - type: contains
        target: "Validation Scorecard"
        weight: 0.8
      - type: contains
        target: "Recommended Validation Experiments"
        weight: 0.6

  - id: assess_business_concept
    prompt: "Assess this business idea: an AI-powered tool that automatically generates compliance documentation for healthcare startups"
    fixtures: []
    rubric:
      - "classifies input type and extracts core elements"
      - "identifies regulatory complexity as a key factor"
      - "produces SWOT and PESTLE analyses"
      - "scores problem-solution fit and market opportunity"
    trigger_expected: true
    assertions:
      - type: contains
        target: "SWOT"
        weight: 1.0
      - type: contains
        target: "PESTLE"
        weight: 0.8
      - type: matches_regex
        target: "Strong|Promising|Risky|Weak"
        weight: 0.8
      - type: contains
        target: "Problem-Solution Fit"
        weight: 0.6
      - type: matches_regex
        target: "(?i)regulatory|compliance|legal"
        weight: 0.6

  - id: evaluate_product_concept
    prompt: "Evaluate this product concept — a browser extension that summarizes terms of service agreements and flags concerning clauses for consumers"
    fixtures: []
    rubric:
      - "builds Lean Canvas including channels and revenue model"
      - "analyzes competitive landscape including existing solutions"
      - "assesses technical feasibility"
      - "recommends validation experiments"
    trigger_expected: true
    assertions:
      - type: contains
        target: "Lean Canvas"
        weight: 1.0
      - type: contains
        target: "Competitive"
        weight: 0.8
      - type: contains
        target: "Recommended Validation Experiments"
        weight: 0.8
      - type: matches_regex
        target: "\\d\\.\\d\\s*/\\s*5"
        weight: 0.6
      - type: contains
        target: "Revenue"
        weight: 0.6

  - id: critique_business_plan
    prompt: "Critique this business plan for a subscription-based meal prep delivery service targeting remote workers"
    fixtures: []
    rubric:
      - "evaluates problem-solution fit for the target segment"
      - "analyzes unit economics and logistics feasibility"
      - "identifies competitive threats from existing meal delivery services"
      - "produces scored validation report"
    trigger_expected: true
    assertions:
      - type: contains
        target: "Validation Scorecard"
        weight: 0.8
      - type: matches_regex
        target: "Strong|Promising|Risky|Weak"
        weight: 1.0
      - type: contains
        target: "Red Flags"
        weight: 0.6
      - type: contains
        target: "Financial"
        weight: 0.6
      - type: contains
        target: "Competitive"
        weight: 0.6

  - id: review_idea_viability
    prompt: "Review my idea and tell me if it's viable: a marketplace connecting local craftspeople with interior designers"
    fixtures: []
    rubric:
      - "performs market opportunity analysis"
      - "assesses two-sided marketplace dynamics"
      - "evaluates financial viability including marketplace take rates"
      - "delivers clear verdict with justification"
    trigger_expected: true
    assertions:
      - type: matches_regex
        target: "Strong|Promising|Risky|Weak"
        weight: 1.0
      - type: contains
        target: "Market Opportunity"
        weight: 0.8
      - type: contains
        target: "Executive Summary"
        weight: 0.8
      - type: matches_regex
        target: "\\d\\.\\d\\s*/\\s*5"
        weight: 0.6

  - id: check_idea_feasibility
    prompt: "Check if this idea is feasible — building an open-source alternative to Salesforce CRM for small businesses"
    fixtures: []
    rubric:
      - "analyzes technical feasibility of building CRM"
      - "evaluates competitive position against Salesforce and alternatives"
      - "assesses open-source business model viability"
      - "identifies key risks and red flags"
    trigger_expected: true
    assertions:
      - type: contains
        target: "Technical Feasibility"
        weight: 0.8
      - type: contains
        target: "Red Flags"
        weight: 0.8
      - type: matches_regex
        target: "Strong|Promising|Risky|Weak"
        weight: 1.0
      - type: contains
        target: "Competitive"
        weight: 0.6
      - type: matches_regex
        target: "\\d\\.\\d\\s*/\\s*5"
        weight: 0.6

  - id: score_pivot_scenario
    prompt: "We're a B2B analytics tool considering pivoting to serve individual content creators instead. Score this pivot idea."
    fixtures: []
    rubric:
      - "classifies input as pivot assessment"
      - "compares current B2B positioning with proposed B2C direction"
      - "evaluates market size difference and go-to-market implications"
      - "produces validation scorecard for the pivot"
    trigger_expected: true
    assertions:
      - type: matches_regex
        target: "(?i)pivot"
        weight: 1.0
      - type: contains
        target: "Validation Scorecard"
        weight: 0.8
      - type: matches_regex
        target: "Strong|Promising|Risky|Weak"
        weight: 0.8
      - type: matches_regex
        target: "B2B|B2C"
        weight: 0.6

  - id: audit_business_concept
    prompt: "Audit this business concept: a peer-to-peer energy trading platform using blockchain for residential solar panel owners"
    fixtures: []
    rubric:
      - "identifies regulatory and legal factors via PESTLE"
      - "evaluates blockchain technical feasibility"
      - "assesses market readiness and timing"
      - "flags regulatory red flags"
    trigger_expected: true
    assertions:
      - type: contains
        target: "PESTLE"
        weight: 1.0
      - type: contains
        target: "Red Flags"
        weight: 0.8
      - type: matches_regex
        target: "(?i)regulatory|legal|compliance"
        weight: 0.8
      - type: matches_regex
        target: "Strong|Promising|Risky|Weak"
        weight: 0.6
      - type: contains
        target: "Technical Feasibility"
        weight: 0.6

  # Negative cases — should NOT trigger

  - id: market_research_only
    prompt: "What is the market size for the electric vehicle charging industry?"
    fixtures: []
    rubric:
      - "this is a market research question, not idea validation"
    trigger_expected: false

  - id: competitive_analysis_only
    prompt: "Compare Figma, Sketch, and Adobe XD features and pricing"
    fixtures: []
    rubric:
      - "this is a competitive comparison, not idea validation"
    trigger_expected: false

  - id: code_review_request
    prompt: "Review this Python function for bugs and performance issues"
    fixtures: []
    rubric:
      - "this is a code review, not business idea validation"
    trigger_expected: false

  - id: general_business_advice
    prompt: "What are some good strategies for customer retention?"
    fixtures: []
    rubric:
      - "this is general business advice, not idea validation"
    trigger_expected: false

  - id: financial_calculation
    prompt: "Calculate the break-even point for a product that costs $50 to make and sells for $120"
    fixtures: []
    rubric:
      - "this is a financial calculation, not idea validation"
    trigger_expected: false

  - id: resume_review
    prompt: "Review my resume and suggest improvements for product manager roles"
    fixtures: []
    rubric:
      - "this is a resume review, not idea validation"
    trigger_expected: false
